data:
  table: public.real_estate_dataset_clean
  out: data/processed/dataset.csv
  chunk_size: 100000

train:
  target: price
  test_size: 0.2
  random_state: 42

model:
  n_estimators: 500
  max_depth: 8
  learning_rate: 0.1
  loss_function: RMSE

s3:
  bucket: replace-with-your-bucket
  model_key: models/real_estate/model.pkl
  endpoint_url: https://storage.yandexcloud.net

name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test dependencies
        run: pip install numpy==1.26.2 pandas==2.1.3 pytest==8.3.4

      - name: Run unit tests
        run: pytest -q

      - name: Check Python syntax
        run: python -m compileall -q part1_airflow/dags part1_airflow/plugins part2_dvc/scripts

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose config --quiet
